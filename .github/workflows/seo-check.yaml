name: "SEO Check"

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Run SEO-Check
        run: docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ghcr.io/l3montree-dev/devguard-documentation/seo-check:main-amd64
