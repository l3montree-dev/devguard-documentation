name: "SEO Check"

on:
  push:
  workflow_dispatch:

jobs:
  seo-check:
    runs-on: ubuntu-latest
    container:
      image: registry.opencode.de/open-code/document-writing-tools/seo-check:main-amd64
    steps:
      - uses: actions/checkout@v6
      - name: Run SEO-Check
        run: bun run /seo-check/main.ts