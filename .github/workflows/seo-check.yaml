name: "SEO Check"

on:
  push:
  workflow_dispatch:

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run SEO-Check
        run: docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ghcr.io/l3montree-dev/devguard-documentation/seo-check:main-amd64
