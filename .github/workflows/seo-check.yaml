name: "SEO Check"

on:
  push:
  workflow_dispatch:

jobs:
  registry-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check registry reachability
        run: |
          echo "=== DNS lookup (default resolver) ==="
          dig registry.opencode.de || true
          echo "=== DNS lookup (Google 8.8.8.8) ==="
          dig @8.8.8.8 registry.opencode.de || true
          echo "=== DNSSEC check ==="
          dig @8.8.8.8 registry.opencode.de +dnssec || true
          echo "=== Trace route ==="
          traceroute -m 10 registry.opencode.de || true
          echo "=== curl ==="
          curl -vI https://registry.opencode.de/v2/ 2>&1 || true

  seo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fix DNS if broken
        run: |
          if ! dig +short registry.opencode.de | grep -q .; then
            echo "DNS resolution failed, falling back to hardcoded IP"
            echo "141.95.36.242 registry.opencode.de" | sudo tee -a /etc/hosts
          fi
      - name: Run SEO-Check
        run: docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace registry.opencode.de/open-code/document-writing-tools/seo-check:main-amd64
