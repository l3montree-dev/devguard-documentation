name: "SEO Check"

on:
  push:
  workflow_dispatch:

jobs:
  registry-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check registry reachability
        run: |
          echo "=== DNS lookup ==="
          dig registry.opencode.de || nslookup registry.opencode.de
          echo "=== Trace route ==="
          traceroute -m 10 registry.opencode.de || true
          echo "=== curl ==="
          curl -vI https://registry.opencode.de/v2/ 2>&1 || true

  seo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run SEO-Check
        uses: docker://registry.opencode.de/open-code/document-writing-tools/seo-check:main-amd64
